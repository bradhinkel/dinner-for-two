<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dinner for Two — UX Draft</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter+Tight:wght@400;500;600&display=swap"
  rel="stylesheet"
/>

<style>
  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: #1a1a1a;
    font-family: 'Inter Tight', system-ui, sans-serif;
  }
  .screen-shadow {
    box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 4px 14px rgba(0,0,0,0.25);
    border-radius: 28px;
    overflow: hidden;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="b/atoms.jsx"></script>
<script type="text/babel" src="b/chrome.jsx"></script>
<script type="text/babel" src="b/screen-empty.jsx"></script>
<script type="text/babel" src="b/screen-brief.jsx"></script>
<script type="text/babel" src="b/screen-composing.jsx"></script>
<script type="text/babel" src="b/screen-evening.jsx"></script>
<script type="text/babel" src="b/screen-alternates.jsx"></script>
<script type="text/babel" src="b/screen-share.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas
      title="Dinner for Two — UX draft"
      subtitle="A thoughtful concierge for date-night dinner. Modernist editorial chassis, warm cream + oxblood palette, Cormorant Garamond italic display + Inter Tight UI. Six core screens covering the full hero loop."
    >
      <DCSection
        id="primary-flow"
        title="Primary flow"
        subtitle="The main loop: launch → set the brief → composing → the evening → swap details or alternates → share with the partner."
      >
        <DCArtboard id="empty" label="00 — First launch" width={390} height={844}>
          <div className="screen-shadow"><window.BEmptyScreen /></div>
        </DCArtboard>
        <DCArtboard id="brief" label="01 — Set the brief" width={390} height={844}>
          <div className="screen-shadow"><window.BBriefScreen /></div>
        </DCArtboard>
        <DCArtboard id="composing" label="02 — Composing" width={390} height={844}>
          <div className="screen-shadow"><window.BComposingScreen /></div>
        </DCArtboard>
        <DCArtboard id="evening" label="03 — The evening (hero)" width={390} height={844}>
          <div className="screen-shadow"><window.BEveningScreen /></div>
        </DCArtboard>
        <DCArtboard id="alternates" label="04 — Different room" width={390} height={844}>
          <div className="screen-shadow"><window.BAlternatesScreen /></div>
        </DCArtboard>
        <DCArtboard id="share" label="05 — Share view" width={390} height={844}>
          <div className="screen-shadow"><window.BShareScreen /></div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
